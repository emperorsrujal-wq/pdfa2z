name: Auto-generate daily blog post

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate daily blog post
        run: node scripts/generateDailyBlog.js

      - name: Commit and push if changes exist
        run: |
          if [ -n "$(git diff --name-only)" ]; then
            git config user.name "PDFA2Z Blog Bot"
            git config user.email "bot@pdfa2z.com"
            git add utils/blogData.ts public/sitemap.xml
            git commit -m "Auto-generate daily blog post"
            git push
          else
            echo "No changes to commit"
          fi
