<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#4f46e5" />
  <title>PDFA2Z - Professional Online PDF & Image Tools</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg">

  <!-- DNS prefetch + preconnect for fonts (non-render-blocking) -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!--
    Load Google Fonts non-render-blocking using the media="print" trick.
    The onload switches it to all media once loaded; the <noscript> fallback
    covers browsers with JS disabled.
  -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" media="print"
    onload="this.media='all'">
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
  </noscript>

  <script>
    (function () {
      const processPolyfill = {
        env: { API_KEY: "" },
        browser: true,
        version: '',
        nextTick: (cb) => setTimeout(cb, 0)
      };
      window.process = window.process || processPolyfill;
      window.process.env = window.process.env || {};
      if (typeof window.process.env.API_KEY === 'undefined') { window.process.env.API_KEY = ""; }
      window.global = window;
      if (typeof window.Buffer === 'undefined') {
        window.Buffer = {
          isBuffer: (obj) => obj instanceof Uint8Array || (obj && obj._isBuffer),
          from: (data) => {
            if (typeof data === 'string') return new TextEncoder().encode(data);
            if (data instanceof ArrayBuffer) return new Uint8Array(data);
            return new Uint8Array(data);
          },
          alloc: (size) => new Uint8Array(size),
          byteLength: (s) => (typeof s === 'string' ? new TextEncoder().encode(s).length : s.length)
        };
      }
      if (typeof window.aistudio === 'undefined') {
        window.aistudio = {
          hasSelectedApiKey: async () => false,
          openSelectKey: async () => {
            alert("In a production environment, this would open the Google AI Studio key selection dialog.");
          }
        };
      }
    })();
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #ffffff;
      color: #0f172a;
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }

    .animate-fade-in {
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    ::selection {
      background: #4f46e5;
      color: white;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
